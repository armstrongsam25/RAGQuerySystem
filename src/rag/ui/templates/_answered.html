<div class="status-card status-answered">
  <span class="badge badge-answered">Answered</span>
  <p class="answer">{{ response.answer }}</p>

  <h3>Citations</h3>
  <ul class="citations">
    {% for c in response.citations %}
    <li class="citation">
      <span class="page-badge">p. {{ c.page_number }}</span>
      <blockquote>
        {{ c.quoted_span }}{% if c.truncated %} <span class="truncated">(truncated)</span>{% endif %}
      </blockquote>
      <small class="chunk-id">chunk_id: <code>{{ c.chunk_id }}</code></small>
    </li>
    {% endfor %}
  </ul>
</div>
